<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Monopoly Diamond - Refined</title>
  <style>
    * { box-sizing: border-box; margin:0; padding:0; font-family: 'Segoe UI', Arial; }
    body {
      background: #fdf2e9;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow: hidden;
    }
    h1 { color: #2c3e50; margin-bottom: 20px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
    
    /* 游戏容器 */
    .game-container {
      position: relative;
      width: 600px;
      height: 600px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 菱形棋盘主体 */
    .board {
      position: relative;
      width: 440px; /* 5个格子 * 80px + 边框 */
      height: 440px;
      background: #ebedef;
      border: 8px solid #2c3e50;
      transform: rotate(45deg); /* 核心：菱形旋转 */
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }

    /* 格子样式 */
    .tile {
      position: absolute;
      width: 80px;
      height: 80px;
      border: 1px solid #bdc3c7;
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: bold;
      text-align: center;
      /* 这里让文字转回来，保持水平 */
      transform: rotate(-45deg); 
    }

    /* 棋子 */
    .piece {
      position: absolute;
      width: 34px;
      height: 34px;
      font-size: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
      z-index: 100;
      pointer-events: none;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    /* 特殊格子颜色 */
    .tile.go { background: #2ecc71; color: white; }
    .tile.chance { background: #f1c40f; }
    .tile.jail { background: #e74c3c; color: white; }
    
    .house-indicator { font-size: 14px; color: #d35400; margin-top: 2px; }

    /* 控制面板 */
    .controls { margin-top: 40px; text-align: center; z-index: 200; }
    .dice { font-size: 60px; margin-bottom: 10px; height: 70px; }
    button {
      padding: 12px 30px;
      font-size: 18px;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    button:active { transform: scale(0.95); }
    button:disabled { background: #95a5a6; }

    /* 弹窗 */
    .popup {
      display: none; position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;
    }
    .popup-inner { background: white; padding: 30px; border-radius: 15px; text-align: center; min-width: 250px; }
    .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
  </style>
</head>
<body>

  <h1>🎲 MONOPOLY DIAMOND</h1>

  <div class="game-container">
    <div class="board" id="board">
      </div>
    <div class="piece" id="p1">🐱</div>
    <div class="piece" id="p2">🐶</div>
  </div>

  <div class="controls">
    <div class="dice" id="dice">⚀</div>
    <button id="rollBtn">Roll Dice</button>
    <p id="status" style="margin-top:10px; font-weight:bold;">Player 1's turn</p>
    <p id="money">P1: $1500 | P2: $1500</p>
  </div>

  <div class="popup" id="gamePopup">
    <div class="popup-inner">
      <h2 id="popupTitle">Property</h2>
      <p id="popupText">Description</p>
      <div class="btn-group" id="popupBtns"></div>
    </div>
  </div>

<script>
  const boardElem = document.getElementById('board');
  const tileSize = 80; // 格子大小像素
  const sideCount = 5; // 每条边5个格子
  
  // 属性定义
  const props = [
    {name:"GO", price:0, rent:0, type:"go"},
    {name:"Med.", price:60, rent:10}, {name:"Baltic", price:60, rent:10},
    {name:"Express", price:200, rent:25}, {name:"Oriental", price:100, rent:15},
    {name:"Vermont", price:100, rent:15}, {name:"Chance", price:0, rent:0, type:"chance"},
    {name:"Conn.", price:120, rent:20}, {name:"St. James", price:140, rent:25},
    {name:"Virginia", price:140, rent:25}, {name:"States", price:160, rent:30},
    {name:"Penn.", price:180, rent:35}, {name:"B&O RR", price:200, rent:25},
    {name:"Kentucky", price:180, rent:35}, {name:"Indiana", price:180, rent:35},
    {name:"JAIL", price:0, rent:0, type:"jail"}, {name:"Illinois", price:200, rent:40},
    {name:"Atlantic", price:220, rent:45}, {name:"Chance", price:0, rent:0, type:"chance"},
    {name:"Ventnor", price:220, rent:45}
  ];

  // 1. 自动生成格子并计算精确物理坐标
  const tileCoords = []; 
  function initBoard() {
    // 四个顶点的逻辑位置
    // 边0: (i, 4), 边1: (4, 4-i), 边2: (4-i, 0), 边3: (0, i)
    for(let i=0; i<20; i++) {
      let x, y;
      if(i < 5) { x = i; y = 4; }
      else if(i < 10) { x = 4; y = 4-(i-5); }
      else if(i < 15) { x = 4-(i-10); y = 0; }
      else { x = 0; y = i-15; }

      // 创建DOM
      const t = document.createElement('div');
      t.className = `tile ${props[i].type || ''}`;
      t.style.left = (x * tileSize) + 'px';
      t.style.top = (y * tileSize) + 'px';
      t.innerHTML = `<div>${props[i].name}</div>${props[i].price ? '<div>$'+props[i].price+'</div>' : ''}<div class="h-idx" id="h-${i}"></div>`;
      boardElem.appendChild(t);

      // 核心算法：将旋转45度后的局部坐标转换为全局居中坐标
      // 这里的数学公式处理了棋盘旋转对坐标的影响
      const angle = 45 * Math.PI / 180;
      const boardSize = 400; // 5格*80px
      const centerX = 300, centerY = 300; // 容器中心
      
      const relX = (x * tileSize + tileSize/2) - boardSize/2;
      const relY = (y * tileSize + tileSize/2) - boardSize/2;
      
      // 旋转矩阵变换
      const rotatedX = relX * Math.cos(angle) - relY * Math.sin(angle);
      const rotatedY = relX * Math.sin(angle) + relY * Math.cos(angle);
      
      tileCoords.push({ x: centerX + rotatedX, y: centerY + rotatedY });
    }
  }

  // 2. 游戏状态
  const players = [
    { id:0, name:"P1", money:1500, pos:0, elem:document.getElementById('p1'), owned:[], houses:{} },
    { id:1, name:"P2", money:1500, pos:0, elem:document.getElementById('p2'), owned:[], houses:{} }
  ];
  let turn = 0;

  function updatePlayerPos(pIdx) {
    const p = players[pIdx];
    const coords = tileCoords[p.pos];
    // 加上偏移防止棋子重叠
    const offset = pIdx === 0 ? -12 : 12;
    p.elem.style.left = (coords.x + offset - 17) + 'px';
    p.elem.style.top = (coords.y - 17) + 'px';
  }

  // 3. 游戏逻辑
  function rollDice() {
    const btn = document.getElementById('rollBtn');
    btn.disabled = true;
    const steps = Math.floor(Math.random() * 6) + 1;
    const faces = ['⚀','⚁','⚂','⚃','⚄','⚅'];
    document.getElementById('dice').textContent = faces[steps-1];

    const p = players[turn];
    let count = 0;
    const moveInterval = setInterval(() => {
      p.pos = (p.pos + 1) % 20;
      updatePlayerPos(turn);
      count++;
      if(count >= steps) {
        clearInterval(moveInterval);
        checkTile(p);
      }
    }, 300);
  }

  function checkTile(p) {
    const prop = props[p.pos];
    const owner = players.find(player => player.owned.includes(p.pos));

    if (prop.type === 'chance') {
      showPopup("CHANCE!", "You found some money! Gain $100.", [{label:"Great", cb: () => { p.money += 100; finishTurn(); }}]);
    } 
    else if (owner) {
      if (owner.id === p.id) {
        if(prop.price > 0) {
          showPopup("Your Property", "Build a house for $50?", [
            {label:"Build", cb: () => { 
              if(p.money >= 50) { 
                p.money -= 50; 
                p.houses[p.pos] = (p.houses[p.pos] || 0) + 1;
                document.getElementById(`h-${p.pos}`).innerText = "🏠".repeat(p.houses[p.pos]);
              }
              finishTurn(); 
            }},
            {label:"Skip", cb: finishTurn}
          ]);
        } else { finishTurn(); }
      } else {
        const rent = prop.rent + (owner.houses[p.pos] || 0) * 30;
        showPopup("Pay Rent", `Pay $${rent} to ${owner.name}`, [{label:"Pay", cb: () => { 
          p.money -= rent; owner.money += rent; finishTurn(); 
        }}]);
      }
    } 
    else if (prop.price > 0) {
      showPopup(`Buy ${prop.name}`, `Price: $${prop.price}`, [
        {label:"Buy", cb: () => {
          if(p.money >= prop.price) { p.money -= prop.price; p.owned.push(p.pos); }
          finishTurn();
        }},
        {label:"Pass", cb: finishTurn}
      ]);
    } else {
      finishTurn();
    }
  }

  function showPopup(title, text, btns) {
    document.getElementById('popupTitle').innerText = title;
    document.getElementById('popupText').innerText = text;
    const container = document.getElementById('popupBtns');
    container.innerHTML = '';
    btns.forEach(b => {
      const el = document.createElement('button');
      el.innerText = b.label;
      el.onclick = () => { document.getElementById('gamePopup').style.display = 'none'; b.cb(); };
      container.appendChild(el);
    });
    document.getElementById('gamePopup').style.display = 'flex';
  }

  function finishTurn() {
    if(players[turn].money < 0) alert(players[turn].name + " is bankrupt!");
    turn = (turn + 1) % 2;
    document.getElementById('status').innerText = `${players[turn].name}'s turn`;
    document.getElementById('money').innerText = `P1: $${players[0].money} | P2: $${players[1].money}`;
    document.getElementById('rollBtn').disabled = false;
  }

  // 初始化
  initBoard();
  updatePlayerPos(0);
  updatePlayerPos(1);
  document.getElementById('rollBtn').onclick = rollDice;

</script>
</body>
</html>
