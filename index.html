<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Monopoly</title>
  <style>
    body {
      font-family: Arial;
      background: #fff8e1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .board {
      position: relative;
      width: 500px;
      height: 500px;
      border: 3px solid #333;
      background: #ffcc80;
      margin-top: 30px;
    }
    .tile {
      position: absolute;
      width: 50px;
      height: 50px;
      border: 1px solid #666;
      background: white;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .piece {
      position: absolute;
      width: 28px;
      height: 28px;
      font-size: 24px;
      transition: all 0.7s ease;
      z-index: 10;
    }
    .dice {
      font-size: 40px;
      margin: 20px;
    }
    .dice.shake {
      animation: shake 0.5s infinite;
    }
    @keyframes shake {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(10deg); }
      50% { transform: rotate(-10deg); }
      100% { transform: rotate(0deg); }
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      background: #d32f2f;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .popup {
      display: none;
      position: fixed;
      top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.5);
      z-index: 999;
    }
    .popup-inner {
      background: white;
      width: 280px;
      margin: 150px auto;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }
  </style>
</head>

<body>
  <h1>Monopoly</h1>

  <div class="board" id="board">
    <div class="tile" style="left:0px; bottom:0px;">GO</div>
    <div class="tile" style="left:50px; bottom:0px;">A</div>
    <div class="tile" style="left:100px; bottom:0px;">B</div>
    <div class="tile" style="left:150px; bottom:0px;">C</div>
    <div class="tile" style="left:200px; bottom:0px;">D</div>
    <div class="tile" style="left:250px; bottom:0px;">E</div>
    <div class="tile" style="left:300px; bottom:0px;">CHANCE</div>
    <div class="tile" style="left:350px; bottom:0px;">F</div>
    <div class="tile" style="left:400px; bottom:0px;">G</div>
    <div class="tile" style="left:450px; bottom:0px;">H</div>

    <div class="tile" style="right:0px; bottom:50px;">I</div>
    <div class="tile" style="right:0px; bottom:100px;">J</div>
    <div class="tile" style="right:0px; bottom:150px;">K</div>
    <div class="tile" style="right:0px; bottom:200px;">L</div>
    <div class="tile" style="right:0px; bottom:250px;">M</div>
    <div class="tile" style="right:0px; bottom:300px;">N</div>
    <div class="tile" style="right:0px; bottom:350px;">O</div>
    <div class="tile" style="right:0px; bottom:400px;">P</div>
    <div class="tile" style="right:0px; top:0px;">JAIL</div>

    <div class="tile" style="right:50px; top:0px;">Q</div>
    <div class="tile" style="right:100px; top:0px;">R</div>
    <div class="tile" style="right:150px; top:0px;">S</div>
    <div class="tile" style="right:200px; top:0px;">T</div>
    <div class="tile" style="right:250px; top:0px;">U</div>
    <div class="tile" style="right:300px; top:0px;">CHANCE</div>
    <div class="tile" style="right:350px; top:0px;">V</div>
    <div class="tile" style="right:400px; top:0px;">W</div>
    <div class="tile" style="right:450px; top:0px;">X</div>

    <div class="tile" style="left:0px; top:50px;">Y</div>
    <div class="tile" style="left:0px; top:100px;">Z</div>
    <div class="tile" style="left:0px; top:150px;">1</div>
    <div class="tile" style="left:0px; top:200px;">2</div>
    <div class="tile" style="left:0px; top:250px;">3</div>
    <div class="tile" style="left:0px; top:300px;">4</div>
    <div class="tile" style="left:0px; top:350px;">5</div>
    <div class="tile" style="left:0px; top:400px;">6</div>
  </div>

  <div class="piece" id="p1">🐱</div>
  <div class="piece" id="p2">🐶</div>

  <div class="dice" id="dice">🎲</div>
  <button id="roll">Roll Dice</button>
  <p id="status">Player 1 turn</p>
  <p id="money">P1: 1500 | P2: 1500</p>

  <div class="popup" id="buyPop">
    <div class="popup-inner">
      <h3>Buy Property?</h3>
      <button onclick="buy(true)">YES</button>
      <button onclick="buy(false)">NO</button>
    </div>
  </div>

  <div class="popup" id="chancePop">
    <div class="popup-inner">
      <h3>CHANCE</h3>
      <p id="chanceMsg"></p>
      <button onclick="closeChance()">OK</button>
    </div>
  </div>

  <script>
    const p1 = document.getElementById("p1");
    const p2 = document.getElementById("p2");
    const dice = document.getElementById("dice");
    const rollBtn = document.getElementById("roll");
    const status = document.getElementById("status");
    const money = document.getElementById("money");

    let player = 0;
    let pos = [0, 0];
    let cash = [1500, 1500];

    // 棋子一开始在起点 GO
    p1.style.left = "10px";
    p1.style.bottom = "10px";
    p2.style.left = "30px";
    p2.style.bottom = "10px";

    const positions = [
      {l:0,b:0},{l:50,b:0},{l:100,b:0},{l:150,b:0},{l:200,b:0},{l:250,b:0},{l:300,b:0},{l:350,b:0},{l:400,b:0},{l:450,b:0},
      {r:0,b:50},{r:0,b:100},{r:0,b:150},{r:0,b:200},{r:0,b:250},{r:0,b:300},{r:0,b:350},{r:0,b:400},{r:0,t:0},
      {r:50,t:0},{r:100,t:0},{r:150,t:0},{r:200,t:0},{r:250,t:0},{r:300,t:0},{r:350,t:0},{r:400,t:0},{r:450,t:0},
      {l:0,t:50},{l:0,t:100},{l:0,t:150},{l:0,t:200},{l:0,t:250},{l:0,t:300},{l:0,t:350},{l:0,t:400}
    ];

    function update() {
      money.innerText = `P1: ${cash[0]} | P2: ${cash[1]}`;
      status.innerText = player == 0 ? "Player 1 turn": "Player 2 turn";
    }

    function move() {
      let p = player == 0 ? p1 : p2;
      let step = Math.floor(Math.random()*6)+1;
      pos[player] += step;
      if (pos[player] >= positions.length) pos[player] = 0;
      let d = positions[pos[player]];
      if (d.l !== undefined) p.style.left = d.l + 10 + "px";
      if (d.r !== undefined) p.style.right = d.r + 10 + "px";
      if (d.t !== undefined) p.style.top = d.t + 10 + "px";
      if (d.b !== undefined) p.style.bottom = d.b + 10 + "px";

      if (pos[player] == 6 || pos[player] == 25) {
        chance();
      } else {
        player = 1 - player;
        update();
      }
    }

    function chance() {
      document.getElementById("chancePop").style.display = "block";
      document.getElementById("chanceMsg").innerText = "Get $50";
      cash[player] += 50;
      update();
    }

    function closeChance() {
      document.getElementById("chancePop").style.display = "none";
      player = 1 - player;
      update();
    }

    function buy(ok) {
      document.getElementById("buyPop").style.display = "none";
      if (ok) cash[player] -= 50;
      player = 1 - player;
      update();
    }

    rollBtn.onclick = function() {
      dice.classList.add("shake");
      setTimeout(() => {
        dice.classList.remove("shake");
        move();
      }, 500);
    };

    update();
  </script>
</body>
</html>
